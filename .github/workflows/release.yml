name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify release version
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          versions="$(cargo metadata --no-deps --format-version=1 | python3 -c 'import json, sys; metadata = json.load(sys.stdin); packages = {package["name"]: package["version"] for package in metadata["packages"]}; print(packages["xabi-macros"]); print(packages["xabi"])')"

          macros_version="$(printf '%s\n' "${versions}" | sed -n '1p')"
          xabi_version="$(printf '%s\n' "${versions}" | sed -n '2p')"

          if [ "${macros_version}" != "${xabi_version}" ]; then
            echo "xabi-macros version ${macros_version} does not match xabi version ${xabi_version}" >&2
            exit 1
          fi

          if [ "${GITHUB_REF_NAME}" != "v${xabi_version}" ]; then
            echo "release tag ${GITHUB_REF_NAME} does not match crate version v${xabi_version}" >&2
            exit 1
          fi

          echo "version=${xabi_version}" >> "${GITHUB_OUTPUT}"

      - name: Package crates
        run: cargo package --workspace --locked

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --workspace --locked
