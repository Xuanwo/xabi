name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PYTHON: python
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --locked --all-targets -- -D warnings

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run workspace tests
        run: cargo test --workspace --locked -- --test-threads=1

      - name: Run xabi doctests
        run: cargo test -p xabi --doc --locked

      - name: Check ABI snapshot
        id: abi-check
        continue-on-error: true
        run: cargo run --locked -p xtask -- abi check

      - name: Generate ABI snapshot artifact
        if: steps.abi-check.outcome == 'failure'
        run: cargo run --locked -p xtask -- abi snapshot

      - name: Upload ABI snapshot artifact
        if: steps.abi-check.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: abi-snapshot-${{ runner.os }}
          path: abi/snapshots/*.txt
          if-no-files-found: error

      - name: Fail on ABI snapshot mismatch
        if: steps.abi-check.outcome == 'failure'
        run: exit 1
